    inputs:
      email: "={{System.User.Email}}"

---
kind: TopicDefinition
schema: 1.0.0
name: AlertasCriticos
displayName: Alertas Críticos
trigger:
  phrases:
    - alertas
    - notificações
    - avisos importantes
    - alertas críticos
actions:
  - kind: InvokeFlowAction
    flowId: "{{FLOW_ALERTAS_CRITICOS}}"
    inputs: {}

---
kind: TopicDefinition
schema: 1.0.0
name: Ajuda
displayName: Ajuda e Informações
trigger:
  phrases:
    - ajuda
    - help
    - como funciona
    - instruções
    - regras de férias
actions:
  - kind: SendActivity
    activity:
      text: |
        📚 **Regras de Férias:**
        
        ✅ Antecedência mínima: **45 dias**
        ✅ Mínimo por solicitação: **5 dias**
        ✅ Máximo por solicitação: **30 dias**
        ✅ Verificação de conflitos: **Obrigatória**
        
        **Comandos disponíveis:**
        - "Consultar saldo" - Ver dias disponíveis
        - "Criar solicitação" - Nova solicitação
        - "Verificar status" - Acompanhar solicitações
        - "Verificar conflitos" - Checar equipe
        - "Cancelar solicitação" - Anular pedido
        
        **Para gestores:**
        - "Aprovar" ou "Rejeitar" solicitações
        - "Dashboard" - Visão geral da equipe

---
kind: TopicDefinition
schema: 1.0.0
name: Fallback
displayName: Resposta Padrão
trigger:
  kind: Unknown
actions:
  - kind: SendActivity
    activity:
      text: |
        Desculpe, não entendi seu pedido. 😅
        
        Posso ajudar com:
        - Consultar saldo de férias
        - Criar solicitação
        - Verificar status
        - Verificar conflitos
        
        Digite "ajuda" para mais informações.
